---
layout: default
---

<a href="{{ '/blog' | relative_url }}" class="back-link">← back to blog</a>

<div class="post-header">
  <h1>{{ page.title }}</h1>
  <div class="post-date">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.read_time %} · {{ page.read_time }} min read{% endif %}
  </div>
</div>

<div class="post-content">
  {{ content }}
</div>
