<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Uddhav Panchavati</title>
  <meta name="description" content="{{ page.description | default: 'Personal site of Uddhav Panchavati — researcher, musician, and chronic Barça worrier.' }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2285%22>🧠</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.math %}
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  {% endif %}
</head>
<body>

  <nav>
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="nav-name">Uddhav Panchavati</a>
      <ul class="nav-links">
        <li><a href="{{ '/blog' | relative_url }}"
          {% if page.url contains '/blog' or page.layout == 'post' %}class="active"{% endif %}>blog</a></li>
        <li><a href="{{ '/projects' | relative_url }}"
          {% if page.url contains '/projects' or page.layout == 'project' %}class="active"{% endif %}>projects</a></li>
        <li><a href="{{ '/reading' | relative_url }}"
          {% if page.url contains '/reading' or page.layout == 'book' %}class="active"{% endif %}>reading</a></li>
        <li><a href="{{ '/cv.pdf' | relative_url }}" target="_blank" rel="noopener">cv ↗</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Uddhav Panchavati · 2025</p>
    </div>
  </footer>

</body>
</html>
