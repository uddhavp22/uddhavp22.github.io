---
layout: default
---

<a href="{{ '/projects' | relative_url }}" class="back-link">← back to projects</a>

<div class="post-header">
  {% if page.tags %}
  <div style="margin-bottom: 0.6rem;">
    <span class="project-tag">{{ page.tags | join: ' · ' }}</span>
  </div>
  {% endif %}
  <h1>{{ page.title }}</h1>
  <div class="post-date">{{ page.status | default: 'Active' }} · started {{ page.started | default: '2025' }}</div>
</div>

<div class="post-content">
  {{ content }}
</div>
