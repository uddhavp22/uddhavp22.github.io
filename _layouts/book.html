---
layout: default
---

<a href="{{ '/reading' | relative_url }}" class="back-link">← back to reading</a>

<div class="post-header">
  <div style="margin-bottom: 0.5rem;">
    <span class="project-tag">{{ page.genre | default: 'book' }} · {{ page.status | default: 'read' }}</span>
  </div>
  <h1>{{ page.title }}</h1>
  <div class="post-date">{{ page.author }} · {{ page.status | default: 'read' }}</div>
</div>

<div class="post-content">
  {{ content }}
</div>
